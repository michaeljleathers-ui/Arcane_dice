<!DOCTYPE html>
<html>
<head>
  <title>Arcane Tabletop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Arcane Tabletop</h1>
  <p>Solo adventure dashboard for Michael & Bugs.</p>

<button>Adventure</button>
<button>Character</button>
<button>Inventory</button>
<button>Quest Log</button>
<button>Bugs</button>
<button>Dice</button>

<h2>Adventure</h2>

<div id="story">
    Welcome to Arcane Tabletop.
</div>

<br>

<button onclick="startAdventure()">
    Begin Adventure
</button>
  
  <h2>Dice Tray</h2>

  <button onclick="rollDice(20)">Roll Onyx D20</button>
  <button onclick="rollDice(12)">Roll Marble D12</button>
  <button onclick="rollDice(10)">Roll Emerald D10</button>
  <button onclick="rollDice(8)">Roll Diamond D8</button>
  <button onclick="rollDice(6)">Roll Classic D6</button>
  <button onclick="rollDice(4)">Roll Fire D4</button>

  <h2>Result</h2>
  <div id="result">--</div>

  <script src="script.js"></script>
</body>
</html>
